-- Player variables
	-- Time to wait before refill, frames
MaxRefillTimer = 120
-- Trial display settings
	-- Number of lines to display in trial, must be a non-negative integer. Set to 0 to display the entire list at all times
TrialMaxLines = 10
	-- Number of lines after which to start scrolling trial list, must be smaller than TrialMaxLines unless the latter is set to 0
TrialScrollingStart = 5
	-- Allow displaying multiple actions on a single line
AllowLineCarry = true
-- Trial GUI settings
	-- Position of trial name on screen, coords
GUIHeaderPosX = 0
GUIHeaderPosY = 0
	-- Position of success message on screen, coords
GUISuccessPosX = 0
GUISuccessPosY = 7
	-- Position of list of moves in trial, coords
GUIListPosX = 15
GUIListPosY = 100
-- Position of debug text, coords
DebugTextPosX = 200
DebugTextPosY = 100
	-- Space between lines in trial list, px
GUIListInterval = 7
	-- Horizontal space between trial text and start/end markers
GUIScrollMarkerInterval = 10
	-- Color used for GUI text as normal. Insert 4-byte hex value (0xRRGGBBAA) or select from following: 
	-- "clear", "white", "black", "gray"/"grey", "red", "green", "blue", "yellow", "cyan", "magenta", "purple", "teal", "orange", "chartreuse"
GUIDefaultColor = "white"
	-- Color used for highlighting successful actions when progressing the trial
GUISuccessColor = "red"
	-- Message to display when trial is completed
GUISuccessText = "Complete!"
	-- Display debug information
DisplayDebugText = false
-- Menu settings
	-- Color used for text on non-highlighted menu elements
MenuDefaultTextColor = "white"
	-- Color used for text on highlighted menu elements
MenuHighlightTextColor = "yellow"
-- Color used for text on descriptions of menu elements
MenuDescriptionTextColor = "white"
	-- Color used for the text describing the confirm & back buttons
MenuInputHelperTextColor = "green"